---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 2.3.7
serverless_language: ''
polling_url: https://trmnl-sports.carter-pape.workers.dev/next-game?team={{ team_id }}&type={{ game_type }}
polling_headers: ''
polling_body: ''
id: 271063
custom_fields:
- keyname: team_id
  field_type: xhrSelectSearch
  name: Team
  endpoint: https://trmnl-sports.carter-pape.workers.dev/teams
  exclude_csrf_token: true
  help_text: Search by city, team name, or mascot. For example, 'Chicago', 'Bulls', and 'Chicago Bulls' all return the Bulls.
- keyname: game_type
  field_type: select
  options:
  - Any Next Game: any
  - Next Home Game: home
  - Next Away Game: away
  default: any
  name: Game Filter
- keyname: author_bio
  field_type: author_bio
  name: About this plugin
  category: sports
  description: Shows the next scheduled game for your favorite team across major sports leagues — including the NHL, NBA, MLB, NFL, MLS, NCAA, WNBA, NWSL, the top European soccer leagues (EPL, La Liga, Bundesliga, Serie A, Ligue 1), AFL, NRL, IPL, and Big Bash. Optionally filter to home or away games only. Powered by TheSportsDB.
  github_url: https://github.com/CarterPape/trmnl-sports
name: Next Game
refresh_interval: 15
