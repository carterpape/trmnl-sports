polling_headers: ''
polling_body: ''
id: 271063
custom_fields:
- keyname: team_id
  field_type: xhrSelectSearch
  name: Team
  endpoint: https://trmnl-sports.carter-pape.workers.dev/teams
  exclude_csrf_token: true
- keyname: game_type
  field_type: select
  options:
  - Any Next Game: any
  - Next Home Game: home
  - Next Away Game: away
  default: any
  name: Game Filter
