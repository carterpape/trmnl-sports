---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 3.0.0
serverless_language: ''
polling_url: https://trmnl-sports.carter-pape.workers.dev/next-game?team={{ team_id }}&type={{ game_type }}&locale={{ trmnl.user.locale }}&tz={{ trmnl.user.time_zone_iana }}&device={{ trmnl.device.friendly_id }}
polling_headers: ''
polling_body: ''
id: 271063
custom_fields:
- keyname: team_id
  field_type: xhrSelectSearch
  name: Team
  endpoint: https://trmnl-sports.carter-pape.workers.dev/teams
  exclude_csrf_token: true
  help_text: Search by city, team name, or mascot. For example, 'Chicago', 'Bulls', and 'Chicago Bulls' all return the Bulls.
- keyname: game_type
  field_type: select
  options:
  - Any Next Game: any
  - Next Home Game: home
  - Next Away Game: away
  default: any
  name: Game Filter
- keyname: author_bio
  field_type: author_bio
  name: About this plugin
  category: sports
  description: Shows the next scheduled game for teams across major sports leagues, including:<br><br> • North American professional sports (NFL, NBA, NHL, MLB, MLS, WNBA, NWSL)<br> • College football and basketball<br> • Top European soccer leagues (EPL, La Liga, Bundesliga, Serie A, Ligue 1)<br> • Aussie leagues (AFL, NRL, Big Bash)<br> • Indian Premier League<br><br> Optionally filter to only see home or away games.
  github_url: https://github.com/CarterPape/trmnl-sports
name: Next Game
refresh_interval: 15
